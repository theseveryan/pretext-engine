<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FX Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@900&family=Montserrat:wght@900&family=Oswald:wght@700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="theme-switch">
                <span>Интерфейс</span>
                <button id="toggleTheme">Тёмная тема</button>
            </div>
            <h2>Настройки FX</h2>
        </div>
        
        <div class="sidebar-scroll">
            <div class="accordion">
                <div class="accordion-header active">
                    <span>Настройка текста</span>
                    <span class="caret">▼</span>
                </div>
                <div class="accordion-content open">
                    <div class="accordion-inner">
                        <div class="control-group">
                            <label>Слово-маска:</label>
                            <input type="text" id="cfgMaskText" value="ERound">
                        </div>
						<div class="dynamic-group" id="groupWord2">
                            <div class="dynamic-inner">
                                <div class="control-group">
                                    <label>Второе слово:</label>
                                    <input type="text" id="cfgMaskText2" value="GENERATOR">
                                </div>
                                <div class="control-group">
                                    <label>Масштаб 2 слова (%):</label>
                                    <div class="slider-row">
                                        <input type="range" id="cfgScale2" min="10" max="200" value="80">
                                        <input type="number" id="cfgScaleVal2" value="80">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Текст заполнения маски:</label>
                            <textarea id="cfgFillText" rows="3">ERound — искусство вести бизнес через совершенство технологий. Мы превращаем сложные процессы в изящные решения.</textarea>
                        </div>
                        <div class="control-group">
                            <label>Google Шрифт:</label>
                            <select id="cfgFont">
                                <option value="Manrope">Manrope</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Oswald">Oswald</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Форма маски:</label>
                            <select id="cfgLayout">
                                <option value="center">По центру (1 слово)</option>
                                <option value="center2">По центру (2 слова)</option>
                                <option value="col-single">Сплошной текст</option>
                                <option value="col-narrow">1 Столбец</option>
                                <option value="col-indep">3 Столбца</option>
                                <option value="image">Из картинки</option>
                            </select>
                        </div>
                        <div class="dynamic-group" id="groupImage">
                            <div class="dynamic-inner">
                                <div class="control-group">
                                    <label>Загрузить изображение:</label>
                                    <input type="file" id="cfgImage" accept="image/*">
                                </div>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Масштаб / Размер (%):</label>
                            <div class="slider-row">
                                <input type="range" id="cfgScale" min="10" max="200" value="100">
                                <input type="number" id="cfgScaleVal" value="100">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion">
                <div class="accordion-header">
                    <span>Настройка анимации</span>
                    <span class="caret">▼</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-inner">
                        <div class="control-group">
                            <label>Анимация появления:</label>
                            <select id="cfgIntro">
                                <option value="none">Без эффекта</option>
                                <option value="explosion" selected>Фонтан / Взрыв</option>
                                <option value="tape">Кинолента (Вьющаяся)</option>
                                <option value="fade">Плавное проявление (Fade)</option>
                                <option value="drop">Падение сверху (Drop)</option>
                                <option value="spin">Вихрь / Раскрутка (Spin)</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Скорость появления:</label>
                            <div class="slider-row">
                                <input type="range" id="cfgIntroSpeed" min="10" max="300" value="100">
                                <input type="number" id="cfgIntroSpeedVal" value="100">
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Фоновая анимация:</label>
                            <select id="cfgIdle">
                                <option value="none">Без анимации</option>
                                <option value="wave" selected>Дыхание (Волна)</option>
                                <option value="pulse">Пульсация</option>
                                <option value="glitch">Шум (Глитч)</option>
                                <option value="lens">Линза</option>
                                <option value="liquid">Жидкость</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Реакция на курсор:</label>
                            <select id="cfgMouse">
                                <option value="none">Без реакции</option>
                                <option value="repel" selected>Отталкивание (Нож сквозь масло)</option>
                                <option value="gravity">Гравитация (Притяжение)</option>
                                <option value="vortex">Вихрь (Торнадо)</option>
                                <option value="flashlight">Фонарик</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Радиус реакции:</label>
                            <div class="slider-row">
                                <input type="range" id="cfgMouseRadius" min="30" max="300" value="100">
                                <input type="number" id="cfgMouseRadiusVal" value="100">
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Сила реакции (%):</label>
                            <div class="slider-row">
                                <input type="range" id="cfgMouseForce" min="10" max="200" value="100">
                                <input type="number" id="cfgMouseForceVal" value="100">
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Скорость бегущей строки X:</label>
                            <div class="slider-row">
                                <input type="range" id="cfgSpeedX" min="-100" max="100" value="30">
                                <input type="number" id="cfgSpeedXVal" value="30">
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Скорость бегущей строки Y:</label>
                            <div class="slider-row">
                                <input type="range" id="cfgSpeedY" min="-100" max="100" value="0">
                                <input type="number" id="cfgSpeedYVal" value="0">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <button id="generateBtn">Экспорт кода</button>
        </div>
    </div>
    
    <div id="preview"><canvas id="canvas"></canvas></div>

    <div id="exportModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Экспорт PreText эффекта</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <p class="modal-desc">Ваш эффект готов к использованию. Код полностью автономный и работает без сервера — достаточно открыть .html файл в браузере. Вставьте в свой проект через iframe или скопируйте движок напрямую.</p>
                <textarea id="exportCode" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button id="copyCodeBtn">Скопировать код</button>
                <button id="downloadHtmlBtn">Скачать .HTML файл</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
