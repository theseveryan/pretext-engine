<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FX Generator</title>
    <link id="googleFontsLink" href="" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
</head>
<body class="light-theme">

    <button id="sidebarToggle" title="Показать/скрыть панель">&#9776;</button>

    <div id="sidebar" class="open">
        <div class="sidebar-header">
            <div class="header-row">
                <h2>FX Generator</h2>
                <div class="header-btns">
                    <button id="toggleTheme" title="Сменить тему">&#9681;</button>
                    <button id="sidebarClose" title="Скрыть панель">&times;</button>
                </div>
            </div>
            <div class="presets-row">
                <select id="cfgPreset">
                    <option value="">-- Пресет --</option>
                    <option value="hero">Hero (Заголовок)</option>
                    <option value="newspaper">Newspaper (Газета)</option>
                    <option value="matrix">Matrix (Матрица)</option>
                    <option value="liquid">Liquid (Жидкость)</option>
                    <option value="neon">Neon (Неон)</option>
                    <option value="minimal">Minimal (Минимализм)</option>
                </select>
            </div>
        </div>

        <div class="sidebar-scroll">
            <!-- СЕКЦИЯ: МАСКА -->
            <div class="accordion">
                <div class="accordion-header active">
                    <span>Маска</span>
                    <span class="caret">&#9660;</span>
                </div>
                <div class="accordion-content open">
                    <div class="accordion-inner">
                        <div class="control-group">
                            <label>Форма маски:</label>
                            <select id="cfgLayout">
                                <option value="center">По центру (1 слово)</option>
                                <option value="center2">По центру (2 слова)</option>
                                <option value="col-single">Сплошной текст</option>
                                <option value="col-narrow">1 Столбец</option>
                                <option value="col-indep">3 Столбца (газетные)</option>
                                <option value="image">Из картинки</option>
                                <option value="video">Из видео</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Слово-маска:</label>
                            <input type="text" id="cfgMaskText" value="SEVERYAN">
                        </div>
                        <div class="dynamic-group" id="groupWord2">
                            <div class="dynamic-inner">
                                <div class="control-group">
                                    <label>Второе слово:</label>
                                    <input type="text" id="cfgMaskText2" value="CODE">
                                </div>
                                <div class="control-group">
                                    <label>Масштаб 2 слова:</label>
                                    <div class="slider-row">
                                        <input type="range" id="cfgScale2" min="10" max="200" value="80">
                                        <input type="number" id="cfgScaleVal2" value="80">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Шрифт маски:</label>
                            <div class="font-picker" id="fontPickerMask"></div>
                            <input type="hidden" id="cfgFontMask" value="Manrope">
                        </div>
                        <div class="control-group">
                            <label>Масштаб маски:</label>
                            <div class="slider-row">
                                <input type="range" id="cfgScale" min="10" max="200" value="100">
                                <input type="number" id="cfgScaleVal" value="100">
                            </div>
                        </div>
                        <div class="dynamic-group" id="groupImage">
                            <div class="dynamic-inner">
                                <div class="control-group">
                                    <label>Загрузить изображение:</label>
                                    <input type="file" id="cfgImage" accept="image/*">
                                </div>
                            </div>
                        </div>
                        <div class="dynamic-group" id="groupVideo">
                            <div class="dynamic-inner">
                                <div class="control-group">
                                    <label>Загрузить видео:</label>
                                    <input type="file" id="cfgVideo" accept="video/*">
                                </div>
                            </div>
                        </div>
                        <div class="dynamic-group" id="groupThreshold">
                            <div class="dynamic-inner">
                                <div class="control-group">
                                    <label>Порог яркости:</label>
                                    <div class="slider-row">
                                        <input type="range" id="cfgVideoThreshold" min="10" max="90" value="50">
                                        <input type="number" id="cfgVideoThresholdVal" value="50">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion">
                <div class="accordion-header">
                    <span>Текст заполнения</span>
                    <span class="caret">&#9660;</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-inner">
                        <div class="control-group">
                            <label>Текст:</label>
                            <textarea id="cfgFillText" rows="2">Только чистый и лёгкий код.</textarea>
                        </div>
                        <div class="control-group">
                            <label>Шрифт:</label>
                            <div class="font-picker" id="fontPickerFill"></div>
                            <input type="hidden" id="cfgFontFill" value="Manrope">
                        </div>
                        <div class="control-group">
                            <label>Размер текста (px):</label>
                            <div class="slider-row">
                                <input type="range" id="cfgFillSize" min="6" max="30" value="14">
                                <input type="number" id="cfgFillSizeVal" value="14">
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Цвет текста:</label>
                            <div class="color-row">
                                <input type="color" id="cfgTextColor" value="#111111">
                                <input type="text" id="cfgTextColorHex" value="#111111" maxlength="7">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion">
                <div class="accordion-header">
                    <span>Фон</span>
                    <span class="caret">&#9660;</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-inner">
                        <div class="control-group">
                            <label>Цвет фона:</label>
                            <div class="color-row">
                                <input type="color" id="cfgBgColor" value="#ffffff">
                                <input type="text" id="cfgBgColorHex" value="#ffffff" maxlength="7">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion">
                <div class="accordion-header">
                    <span>Анимация</span>
                    <span class="caret">&#9660;</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-inner">
                        <div class="two-col">
                            <div class="control-group">
                                <label>Появление:</label>
                                <select id="cfgIntro">
                                    <option value="none">Без эффекта</option>
                                    <option value="explosion" selected>Взрыв</option>
                                    <option value="tape">Кинолента</option>
                                    <option value="fade">Fade</option>
                                    <option value="drop">Drop</option>
                                    <option value="spin">Вихрь</option>
                                    <option value="glitch">Глитч</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <label>Скорость:</label>
                                <div class="slider-row">
                                    <input type="range" id="cfgIntroSpeed" min="10" max="300" value="100">
                                    <input type="number" id="cfgIntroSpeedVal" value="100">
                                </div>
                            </div>
                        </div>
                        <div class="two-col">
                            <div class="control-group">
                                <label>Фоновая:</label>
                                <select id="cfgIdle">
                                    <option value="none">Без анимации</option>
                                    <option value="wave" selected>Волна</option>
                                    <option value="pulse">Пульсация</option>
                                    <option value="glitch">Глитч</option>
                                    <option value="lens">Линза</option>
                                    <option value="liquid">Жидкость</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <label>Курсор:</label>
                                <select id="cfgMouse">
                                    <option value="none">Без реакции</option>
                                    <option value="repel" selected>Отталкивание</option>
                                    <option value="gravity">Притяжение</option>
                                    <option value="vortex">Торнадо</option>
                                    <option value="flashlight">Фонарик</option>
                                </select>
                            </div>
                        </div>
                        <div class="two-col">
                            <div class="control-group">
                                <label>Радиус курсора:</label>
                                <div class="slider-row">
                                    <input type="range" id="cfgMouseRadius" min="30" max="300" value="100">
                                    <input type="number" id="cfgMouseRadiusVal" value="100">
                                </div>
                            </div>
                            <div class="control-group">
                                <label>Сила курсора:</label>
                                <div class="slider-row">
                                    <input type="range" id="cfgMouseForce" min="10" max="200" value="100">
                                    <input type="number" id="cfgMouseForceVal" value="100">
                                </div>
                            </div>
                        </div>
                        <div class="two-col">
                            <div class="control-group">
                                <label>Скорость X:</label>
                                <div class="slider-row">
                                    <input type="range" id="cfgSpeedX" min="-100" max="100" value="30">
                                    <input type="number" id="cfgSpeedXVal" value="30">
                                </div>
                            </div>
                            <div class="control-group">
                                <label>Скорость Y:</label>
                                <div class="slider-row">
                                    <input type="range" id="cfgSpeedY" min="-100" max="100" value="0">
                                    <input type="number" id="cfgSpeedYVal" value="0">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion">
                <div class="accordion-header">
                    <span>PNG-объекты</span>
                    <span class="caret">&#9660;</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-inner">
                        <div class="control-group">
                            <label>Добавить объект:</label>
                            <input type="file" id="cfgAddObject" accept="image/png,image/gif">
                        </div>
                        <div class="control-group">
                            <label>Отступ обтекания:</label>
                            <div class="slider-row">
                                <input type="range" id="cfgObjPadding" min="0" max="60" value="15">
                                <input type="number" id="cfgObjPaddingVal" value="15">
                            </div>
                        </div>
                        <div id="objectsList" class="objects-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <button id="exportOpenBtn">Экспорт</button>
        </div>
    </div>

    <div id="preview"><canvas id="canvas"></canvas></div>



    <div id="exportModal" class="modal-overlay">
        <div class="modal modal-export">
            <div class="modal-header">
                <h3>Экспорт</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="export-tabs">
                <button class="export-tab active" data-tab="code">HTML-код</button>
                <button class="export-tab" data-tab="gif">GIF-анимация</button>
            </div>

            <div class="export-tab-content active" id="tabCode">
                <div class="modal-body">
                    <p class="modal-desc">Код полностью автономный. Откройте .html в браузере или вставьте через iframe.</p>
                    <textarea id="exportCode" readonly></textarea>
                </div>
                <div class="modal-footer">
                    <button id="copyCodeBtn">Скопировать код</button>
                    <button id="downloadHtmlBtn">Скачать .HTML</button>
                </div>
            </div>

            <div class="export-tab-content" id="tabGif">
                <div class="modal-body">
                    <p class="modal-desc">Запишите анимацию в GIF. Настройте параметры и нажмите кнопку записи.</p>
                    <div class="gif-settings-grid">
                        <div class="control-group">
                            <label>Длительность (сек):</label>
                            <input type="number" id="gifDuration" value="3" min="1" max="15" step="0.5">
                        </div>
                        <div class="control-group">
                            <label>FPS:</label>
                            <input type="number" id="gifFps" value="20" min="5" max="30">
                        </div>
                        <div class="control-group">
                            <label>Масштаб:</label>
                            <select id="gifScale">
                                <option value="0.5">50%</option>
                                <option value="1" selected>100%</option>
                                <option value="1.5">150%</option>
                                <option value="2">200%</option>
                            </select>
                        </div>
                    </div>
                    <div class="gif-progress-area" id="gifProgressArea" style="display:none;">
                        <div class="gif-progress-bar"><div class="gif-progress-fill" id="gifProgressFill"></div></div>
                        <p id="gifProgressText">Захват кадров: 0%</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="gifBtn">Записать и скачать .GIF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
